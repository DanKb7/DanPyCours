<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — PyMastery</title>
    <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="fixed inset-0 overflow-hidden">
        <div class="absolute top-1/3 left-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/3 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
    </div>

    <div class="relative z-10 w-full max-w-md">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 mb-6">
                <span class="text-4xl">🐍</span>
                <span class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                    DanPy
                </span>
            </a>
            <h1 class="text-2xl font-bold mb-2">Создайте аккаунт</h1>
            <p class="text-gray-400">Начните учиться программировать уже сегодня</p>
        </div>

        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-8 backdrop-blur-xl">
            <form class="space-y-5">
                <!-- Имя -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Имя</label>
                    <input type="text" placeholder="Иван"
                        class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                </div>

                <!-- Фамилия -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Фамилия</label>
                    <input type="text" placeholder="Иванов"
                        class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                    <input type="email" placeholder="your@email.com"
                        class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                </div>

                <!-- Пароль -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Пароль</label>
                    <input type="password" placeholder="Минимум 8 символов"
                        class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                </div>

                <!-- Согласие -->
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 mt-0.5 rounded border-gray-600 bg-gray-800 text-blue-500 focus:ring-blue-500">
                    <span class="text-sm text-gray-400">
                        Я согласен с <a href="#" class="text-blue-400 hover:text-blue-300 transition">условиями использования</a>
                        и <a href="#" class="text-blue-400 hover:text-blue-300 transition">политикой конфиденциальности</a>
                    </span>
                </label>

                <button type="submit"
                    class="w-full py-3 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl font-semibold hover:from-blue-600 hover:to-purple-700 transition shadow-lg shadow-blue-500/25">
                    Зарегистрироваться 🚀
                </button>
            </form>

            <div class="flex items-center gap-4 my-6">
                <div class="flex-1 h-px bg-gray-700"></div>
                <span class="text-sm text-gray-500">или</span>
                <div class="flex-1 h-px bg-gray-700"></div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button class="flex items-center justify-center gap-2 py-3 bg-gray-800/50 border border-gray-700 rounded-xl hover:bg-gray-800 transition text-sm">
                    🔵 Google
                </button>
                <button class="flex items-center justify-center gap-2 py-3 bg-gray-800/50 border border-gray-700 rounded-xl hover:bg-gray-800 transition text-sm">
                    💬 Telegram
                </button>
            </div>

            <p class="text-center text-gray-400 text-sm mt-6">
                Уже есть аккаунт?
                <a href="login.html" class="text-blue-400 hover:text-blue-300 font-medium transition">Войти</a>
            </p>
        </div>
    </div>

</body>
</html>
